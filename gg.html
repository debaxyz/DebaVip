<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Tamilan - M3 Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <style>
        :root {
            /* M3 Light Theme Baseline Colors */
            --md-sys-color-primary: #006a60;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #74f8e5;
            --md-sys-color-on-primary-container: #00201c;
            --md-sys-color-secondary: #4a635f;
            --md-sys-color-surface: #fafdfa;
            --md-sys-color-on-surface: #191c1b;
            --md-sys-color-surface-variant: #dae5e1;
            --md-sys-color-on-surface-variant: #3f4946;
            --md-sys-color-outline: #6f7976;
            --md-sys-color-error: #ba1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, .brand-name { font-family: 'Google Sans', sans-serif; }

        /* ══ TOP APP BAR ══ */
        .top-app-bar {
            position: fixed;
            top: 0; width: 100%; height: 64px;
            background: var(--md-sys-color-surface);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 100;
        }

        .brand-name {
            font-size: 22px; font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }

        .timer-chip {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 6px 16px; border-radius: 8px;
            font-weight: 500; font-family: 'Google Sans';
        }

        /* ══ M3 NAVIGATION BAR ══ */
        .navigation-bar {
            position: fixed; bottom: 0; width: 100%;
            height: 80px; background: var(--md-sys-color-surface-variant);
            display: flex; justify-content: space-around;
            padding-top: 12px; border-top: 1px solid var(--md-sys-color-outline);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--md-sys-color-on-surface-variant);
            font-size: 12px; font-weight: 500; gap: 4px;
        }

        .nav-icon-wrapper {
            width: 64px; height: 32px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 16px; transition: background 0.2s;
        }

        .nav-item.active .nav-icon-wrapper {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        /* ══ CONTENT AREA ══ */
        .container { padding: 80px 16px 100px; }

        /* ══ M3 CARDS ══ */
        .md-card {
            background: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 12px; padding: 16px;
            margin-bottom: 16px; transition: box-shadow 0.2s;
        }

        .md-card-elevated {
            border: none;
            background: #f3f9f7; /* Slight tint for elevation level 1 */
            box-shadow: 0px 1px 3px rgba(0,0,0,0.1);
        }

        .prediction-display {
            text-align: center; padding: 24px 0;
        }

        .pred-value {
            font-size: 45px; font-weight: 700;
            color: var(--md-sys-color-primary);
            font-family: 'Google Sans';
        }

        /* ══ BUTTONS ══ */
        .md-button {
            height: 40px; padding: 0 24px;
            border-radius: 20px; border: none;
            font-family: 'Google Sans'; font-weight: 500;
            cursor: pointer; display: inline-flex; align-items: center;
            justify-content: center; gap: 8px;
        }

        .md-button-filled {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .md-button-tonal {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        /* ══ INPUT FIELDS ══ */
        .md-input-group { margin-bottom: 16px; }
        .md-input-label {
            font-size: 12px; color: var(--md-sys-color-primary);
            margin-bottom: 4px; display: block; padding-left: 4px;
        }
        .md-input {
            width: 100%; height: 56px; border: none;
            background: var(--md-sys-color-surface-variant);
            border-bottom: 2px solid var(--md-sys-color-outline);
            border-radius: 4px 4px 0 0; padding: 0 16px;
            font-size: 16px;
        }

    </style>
</head>
<body>

    <header class="top-app-bar">
        <span class="brand-name">Cyber Tamilan</span>
        <div class="timer-chip" id="timer">00:45</div>
    </header>

    <main class="container">
        <div class="md-card md-card-elevated">
            <p style="font-size: 14px; color: var(--md-sys-color-on-surface-variant)">Next Prediction</p>
            <div class="prediction-display">
                <span class="pred-value" id="mainPrediction">BIG</span>
            </div>
            <div style="display: flex; gap: 8px;">
                <div class="md-button md-button-tonal" style="flex:1">History</div>
                <div class="md-button md-button-filled" style="flex:1">Analyze</div>
            </div>
        </div>

        <div class="md-card">
            <h2 style="font-size: 16px; margin-bottom: 16px;">Manual Data Entry</h2>
            <div class="md-input-group">
                <label class="md-input-label">Period Number</label>
                <input type="number" class="md-input" placeholder="e.g. 101">
            </div>
            <button class="md-button md-button-filled" style="width: 100%;">
                <span class="material-symbols-outlined">add</span>
                Add Entry
            </button>
        </div>
    </main>

    <nav class="navigation-bar">
        <a href="#" class="nav-item active">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-outlined">home</span>
            </div>
            Home
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-outlined">analytics</span>
            </div>
            Analysis
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon-wrapper">
                <span class="material-symbols-outlined">settings</span>
            </div>
            Settings
        </a>
    </nav>

    <script>
        // Simple script for the active state toggle
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
