<html lang="en">
<head>

    <style>
        :root {
            --neon-green: #00ff88;
            --neon-glow: rgba(0, 255, 136, 0.4);
            --bg-light: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-border: rgba(255, 255, 255, 0.7);
            --font-head: 'Roboto', sans-serif;
            --font-body: 'Open Sans', sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg-light); 
            color: var(--text-main); 
            font-family: var(--font-body);
            overflow-x: hidden; 
            min-height: 100vh; 
        }

        canvas#bg-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #ffffff 0%, #dae3ed 100%);
        }

        /* --- HEADER --- */
        .header {
            position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--card-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); z-index: 1000;
        }

        .logo { 
            font-family: var(--font-head); font-weight: 900; font-size: 1.1rem;
            display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;
        }
        .logo-dot { 
            width: 10px; height: 10px; background: var(--neon-green); 
            border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); 
            animation: pulse 2s infinite;
        }

        .timer-capsule {
            background: #0f172a; color: var(--neon-green); padding: 5px 15px; border-radius: 30px;
            font-family: var(--font-head); font-weight: 700; font-size: 0.9rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        /* --- DASHBOARD LAYOUT --- */
        .container { padding: 20px; max-width: 480px; margin: 0 auto; padding-bottom: 110px; }
        .page { display: none; animation: slideUp 0.4s ease-out forwards; }
        .page.active { display: block; }

        /* --- PREDICTION CARD --- */
        .main-card {
            background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 32px;
            padding: 30px 20px; text-align: center; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04); margin-bottom: 20px;
            position: relative; overflow: hidden;
        }

        /* Shimmer Border Animation */
        .main-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: rotate(45deg); animation: shimmer 4s infinite;
        }

        .issue-label {
            font-family: var(--font-head); font-size: 0.75rem; color: var(--text-muted);
            background: #e2e8f0; padding: 4px 12px; border-radius: 20px;
            display: inline-block; margin-bottom: 20px; font-weight: 500;
        }

        .viz-container {
            position: relative; width: 170px; height: 170px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .neon-ring {
            position: absolute; width: 100%; height: 100%; border: 2px solid transparent;
            border-top: 2px solid var(--neon-green); border-right: 2px solid var(--neon-green);
            border-radius: 50%; animation: rotate 3s linear infinite;
        }

        .prediction-output {
            font-family: var(--font-head); font-size: 2.6rem; font-weight: 900;
            color: #0f172a; letter-spacing: -1px;
        }

        /* --- STATS TILES --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-tile { 
            background: #0f172a; color: #fff; padding: 15px 5px; border-radius: 20px; 
            text-align: center; border: 1px solid #1e293b;
        }
        .stat-tile span { display: block; font-family: var(--font-head); color: var(--neon-green); font-size: 1.2rem; font-weight: 700; }
        .stat-tile small { font-size: 0.65rem; opacity: 0.6; font-weight: 600; text-transform: uppercase; }

        /* --- HISTORY TABLE --- */
        .history-title {
            font-family: var(--font-head); font-size: 0.9rem; font-weight: 700;
            margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
        }
        .table-container { 
            background: var(--card-bg); border-radius: 28px; border: 1px solid var(--glass-border); 
            overflow: hidden;
        }
        .table-head { 
            display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 1fr 1fr; 
            padding: 15px 10px; background: #f8fafc; font-weight: 700; 
            font-size: 0.65rem; color: var(--text-muted); text-align: center;
        }
        .table-row { 
            display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 1fr 1fr; 
            padding: 15px 10px; border-bottom: 1px solid #f1f5f9; align-items: center; 
            text-align: center; font-size: 0.85rem; font-weight: 500;
        }
        
        .status-badge { 
            padding: 4px 8px; border-radius: 8px; font-size: 0.65rem; 
            font-weight: 800; font-family: var(--font-head);
        }
        .win-bg { background: #dcfce7; color: #166534; }
        .loss-bg { background: #fee2e2; color: #991b1b; }

        .number-ball { 
            width: 24px; height: 24px; background: #1e293b; color: var(--neon-green); 
            border-radius: 50%; display: inline-grid; place-items: center; 
            font-size: 0.75rem; font-family: var(--font-head); font-weight: 700;
            margin: 0 auto;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 15px; left: 15px; right: 15px; background: #0f172a;
            height: 72px; border-radius: 24px; display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-btn { 
            color: #64748b; text-decoration: none; font-size: 0.7rem; 
            display: flex; flex-direction: column; align-items: center; transition: 0.3s;
            font-weight: 600; font-family: var(--font-head);
        }
        .nav-btn.active { color: var(--neon-green); }
        .nav-icon { width: 22px; height: 22px; fill: currentColor; margin-bottom: 4px; }

        /* --- ANIMATIONS --- */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { transform: translateX(-150%) rotate(45deg); } 100% { transform: translateX(150%) rotate(45deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        #win-sticker {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; padding: 30px 50px; border-radius: 20px; z-index: 2000;
            box-shadow: 0 0 50px var(--neon-green); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid var(--neon-green); text-align: center;
        }
        #win-sticker.active { transform: translate(-50%, -50%) scale(1); }
        #win-sticker h1 { font-family: var(--font-head); font-weight: 900; color: #000; }
        
        /* --- SYNC STATUS --- */
        .sync-status {
            position: fixed; top: 70px; right: 15px; padding: 6px 12px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; font-family: var(--font-head); z-index: 1001;
            transition: all 0.3s;
        }
        .sync-online { background: #dcfce7; color: #166534; border: 1px solid #22c55e; }
        .sync-offline { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .sync-syncing { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
    </style>
</head>

    <script>
        // ==================== FIREBASE CONFIG ====================

    appId: "1:954183101944:web:e3fd828742f76a55dc7a0d",

        // Initialize Firebase
        let db = null;
        let firebaseConnected = false;
        
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            firebaseConnected = true;
            console.log("Firebase initialized successfully");
        } catch (e) {
            console.error("Firebase init failed:", e);
            firebaseConnected = false;
        }

        const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
        
        // Local state (synced with Firebase)
        let stats = { wins: 0, loss: 0, log: [] };
        let activePred = null; 
        let lastKnownIssue = "";
        let historyData = [];
        let isScanning = false;
        let scanInterval = null;
        let countdownInterval = null;
        let syncListener = null;

        // --- NAVIGATION ---
        function nav(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // ==================== FIREBASE DATABASE FUNCTIONS ====================

        // Save data to Firebase Realtime Database
        async function saveToFirebase() {
            if (!db || !firebaseConnected) {
                console.warn("Firebase not connected, using localStorage fallback");
                localStorage.setItem('cyberX_v3', JSON.stringify(stats));
                localStorage.setItem('cyberX_history', JSON.stringify(historyData));
                localStorage.setItem('cyberX_lastIssue', lastKnownIssue);
                updateSyncStatus('offline');
                return;
            }

            updateSyncStatus('syncing');
            
            try {
                const data = {
                    stats: stats,
                    history: historyData.slice(0, 50), // Keep last 50
                    lastIssue: lastKnownIssue,
                    lastUpdated: new Date().toISOString(),
                    activePred: activePred
                };

                await db.ref('cyberX_data').set(data);
                updateSyncStatus('online');
                console.log("Data saved to Firebase");
            } catch (error) {
                console.error("Firebase save error:", error);
                updateSyncStatus('offline');
                // Fallback to localStorage
                localStorage.setItem('cyberX_v3', JSON.stringify(stats));
                localStorage.setItem('cyberX_history', JSON.stringify(historyData));
                localStorage.setItem('cyberX_lastIssue', lastKnownIssue);
            }
        }

        // Load data from Firebase Realtime Database
        async function loadFromFirebase() {
            if (!db || !firebaseConnected) {
                console.warn("Firebase not connected, loading from localStorage");
                loadFromLocalStorage();
                updateSyncStatus('offline');
                return;
            }

            updateSyncStatus('syncing');

            try {
                const snapshot = await db.ref('cyberX_data').once('value');
                const data = snapshot.val();

                if (data) {
                    stats = data.stats || { wins: 0, loss: 0, log: [] };
                    historyData = data.history || [];
                    lastKnownIssue = data.lastIssue || "";
                    activePred = data.activePred || null;
                    
                    // Ensure log array exists
                    if (!stats.log) stats.log = [];
                    
                    console.log("Data loaded from Firebase");
                    updateSyncStatus('online');
                } else {
                    // No data in Firebase yet, try localStorage
                    loadFromLocalStorage();
                }
            } catch (error) {
                console.error("Firebase load error:", error);
                loadFromLocalStorage();
                updateSyncStatus('offline');
            }
            
            refreshUI();
        }

        // Load from localStorage (fallback)
        function loadFromLocalStorage() {
            stats = JSON.parse(localStorage.getItem('cyberX_v3')) || { wins: 0, loss: 0, log: [] };
            historyData = JSON.parse(localStorage.getItem('cyberX_history')) || [];
            lastKnownIssue = localStorage.getItem('cyberX_lastIssue') || "";
        }

        // Clear Firebase data
        async function clearFirebaseData() {
            if (db && firebaseConnected) {
                try {
                    await db.ref('cyberX_data').remove();
                    console.log("Firebase data cleared");
                } catch (error) {
                    console.error("Firebase clear error:", error);
                }
            }
            // Always clear localStorage too
            localStorage.removeItem('cyberX_v3');
            localStorage.removeItem('cyberX_history');
            localStorage.removeItem('cyberX_lastIssue');
        }

        // Real-time sync listener
        function setupRealtimeSync() {
            if (!db || !firebaseConnected) return;

            // Listen for remote changes
            syncListener = db.ref('cyberX_data').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.lastUpdated) {
                    const remoteTime = new Date(data.lastUpdated).getTime();
                    const localTime = new Date(stats.lastUpdated || 0).getTime();
                    
                    // Only update if remote data is newer
                    if (remoteTime > localTime) {
                        stats = data.stats || stats;
                        historyData = data.history || historyData;
                        lastKnownIssue = data.lastIssue || lastKnownIssue;
                        activePred = data.activePred || activePred;
                        if (!stats.log) stats.log = [];
                        refreshUI();
                        console.log("Real-time sync: remote data updated");
                    }
                }
            });
        }

        // Update sync status UI
        function updateSyncStatus(status) {
            const indicator = document.getElementById('sync-indicator');
            const statusText = document.getElementById('firebase-status');
            
            indicator.className = 'sync-status';
            
            switch(status) {
                case 'online':
                    indicator.classList.add('sync-online');
                    indicator.innerText = 'ONLINE';
                    if (statusText) statusText.innerText = 'Connected';
                    if (statusText) statusText.style.color = '#22c55e';
                    break;
                case 'syncing':
                    indicator.classList.add('sync-syncing');
                    indicator.innerText = 'SYNCING...';
                    if (statusText) statusText.innerText = 'Syncing...';
                    if (statusText) statusText.style.color = '#f59e0b';
                    break;
                case 'offline':
                default:
                    indicator.classList.add('sync-offline');
                    indicator.innerText = 'OFFLINE';
                    if (statusText) statusText.innerText = 'Disconnected';
                    if (statusText) statusText.style.color = '#ef4444';
                    break;
            }
        }

        // Force manual sync
        async function forceSync() {
            updateSyncStatus('syncing');
            await saveToFirebase();
            await loadFromFirebase();
        }

        // ==================== PREDICTION ENGINE ====================
        function buildTransitionMatrix(data) {
            if (data.length < 5) return null;
            let transitions = { '00': 0, '01': 0, '10': 0, '11': 0 };
            let numberPatterns = {};
            for (let i = 0; i < 10; i++) {
                numberPatterns[i] = { 'nextBig': 0, 'nextSmall': 0, 'count': 0 };
            }
            for (let i = 0; i < data.length - 1; i++) {
                const curr = parseInt(data[i].number);
                const next = parseInt(data[i+1].number);
                const currState = curr >= 5 ? '1' : '0';
                const nextState = next >= 5 ? '1' : '0';
                transitions[currState + nextState]++;
                numberPatterns[curr].count++;
                if (next >= 5) numberPatterns[curr].nextBig++;
                else numberPatterns[curr].nextSmall++;
            }
            return { transitions, numberPatterns, totalTransitions: data.length - 1 };
        }

        function calculatePrediction(matrix, lastDraw) {
            if (!matrix || !lastDraw) return { type: 'BIG', confidence: 50 };
            const lastNum = parseInt(lastDraw.number);
            const lastState = lastNum >= 5 ? '1' : '0';
            const trans = matrix.transitions;
            const totalFromState = trans[lastState + '0'] + trans[lastState + '1'];
            let probBig = 0.5, probSmall = 0.5;
            if (totalFromState > 0) {
                probBig = trans[lastState + '1'] / totalFromState;
                probSmall = trans[lastState + '0'] / totalFromState;
            }
            const numPattern = matrix.numberPatterns[lastNum];
            if (numPattern.count > 0) {
                const numProbBig = numPattern.nextBig / numPattern.count;
                probBig = (probBig * 0.6) + (numProbBig * 0.4);
                probSmall = 1 - probBig;
            }
            let streakCount = 1;
            let streakType = lastNum >= 5 ? 'BIG' : 'SMALL';
            for (let i = 1; i < historyData.length; i++) {
                const checkNum = parseInt(historyData[i].number);
                const checkType = checkNum >= 5 ? 'BIG' : 'SMALL';
                if (checkType === streakType) streakCount++;
                else break;
            }
            if (streakCount >= 2) {
                if (streakType === 'BIG') { probBig *= 0.85; probSmall = 1 - probBig; }
                else { probSmall *= 0.85; probBig = 1 - probSmall; }
            }
            const dataReliability = Math.min(matrix.totalTransitions / 20, 1);
            const predictionStrength = Math.abs(probBig - 0.5) * 2;
            const confidence = Math.round((50 + (predictionStrength * 50 * dataReliability)));
            const prediction = probBig > probSmall ? 'BIG' : 'SMALL';
            const finalConfidence = Math.min(Math.max(confidence, 55), 98);
            return { type: prediction, confidence: finalConfidence };
        }

        // ==================== SCAN & REFRESH ENGINE ====================
        async function scanAndRefresh() {
            if (isScanning) return;
            isScanning = true;

            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (!data.data || !data.data.list || data.data.list.length === 0) return;

                const newDraws = [];
                for (const draw of data.data.list) {
                    if (draw.issueNumber === lastKnownIssue) break;
                    newDraws.push(draw);
                }

                if (newDraws.length > 0) {
                    for (let i = newDraws.length - 1; i >= 0; i--) {
                        const draw = newDraws[i];
                        historyData.unshift(draw);
                        if (historyData.length > 50) historyData.pop();
                        processDraw(draw);
                    }

                    lastKnownIssue = newDraws[0].issueNumber;
                    const nextDraw = data.data.list[0];
                    generateNewPred(nextDraw);
                    await saveToFirebase(); // Save to Firebase instead of localStorage
                }
            } catch (e) {
                console.log('Scan error:', e);
            } finally {
                isScanning = false;
            }
        }

        function processDraw(draw) {
            const num = parseInt(draw.number);
            const actualBS = num >= 5 ? 'BIG' : 'SMALL';

            if (activePred && activePred.issue === draw.issueNumber) {
                const isWin = activePred.type === actualBS;
                if (isWin) { stats.wins++; triggerWin(); } else { stats.loss++; }
                stats.log.unshift({
                    issue: draw.issueNumber,
                    ai: activePred.type,
                    num: num,
                    real: actualBS,
                    status: isWin ? 'WIN' : 'LOSS',
                    timestamp: new Date().toISOString()
                });
                if (stats.log.length > 20) stats.log.pop();
            }
        }

        function generateNewPred(lastDraw) {
            const nextId = (BigInt(lastDraw.issueNumber) + 1n).toString();
            document.getElementById('target-issue').innerText = nextId;

            const aiText = document.getElementById('ai-prediction');
            const bar = document.getElementById('prob-bar');
            const val = document.getElementById('prob-val');

            aiText.innerText = "SCANNING";
            aiText.style.opacity = "0.5";
            bar.style.width = "0%";

            setTimeout(() => {
                const matrix = buildTransitionMatrix(historyData);
                const result = calculatePrediction(matrix, lastDraw);

                aiText.innerText = result.type;
                aiText.style.opacity = "1";
                bar.style.width = result.confidence + "%";
                val.innerText = result.confidence + "%";
                activePred = { issue: nextId, type: result.type };
            }, 1500);
        }

        async function save() {
            await saveToFirebase();
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('total-wins').innerText = stats.wins;
            document.getElementById('total-loss').innerText = stats.loss;
            const total = stats.wins + stats.loss;
            document.getElementById('total-acc').innerText = total === 0 ? "0%" : Math.round((stats.wins/total)*100) + "%";

            const logBody = document.getElementById('log-body');
            logBody.innerHTML = stats.log.map(item => `
                <div class="table-row">
                    <span style="font-size:0.65rem; color:var(--text-muted); font-family:var(--font-head);">...${item.issue.slice(-4)}</span>
                    <span style="font-weight:700; color:${item.ai === 'BIG' ? '#6366f1' : '#f59e0b'}">${item.ai.charAt(0)}</span>
                    <span><div class="number-ball">${item.num}</div></span>
                    <span style="font-weight:700; font-size:0.7rem; font-family:var(--font-head);">${item.real}</span>
                    <span><b class="status-badge ${item.status === 'WIN' ? 'win-bg' : 'loss-bg'}">${item.status}</b></span>
                </div>
            `).join('');
        }

        function triggerWin() {
            const s = document.getElementById('win-sticker');
            s.classList.add('active');
            setTimeout(() => s.classList.remove('active'), 2000);
        }

        async function clearHistory() { 
            stats = { wins: 0, loss: 0, log: [] }; 
            historyData = [];
            lastKnownIssue = "";
            activePred = null;
            await clearFirebaseData();
            refreshUI(); 
        }

        // --- CONTINUOUS SCAN TIMER ---
        function startContinuousScan() {
            scanInterval = setInterval(() => {
                scanAndRefresh();
            }, 3000);
        }

        function runTimer() {
            countdownInterval = setInterval(() => {
                const now = new Date();
                const sec = now.getSeconds();
                const rem = 60 - sec;
                document.getElementById('display-timer').innerText = `00:${rem.toString().padStart(2, '0')}`;

                const ring = document.getElementById('ring-anim');
                ring.style.animationDuration = rem < 10 ? "1s" : "3s";
            }, 1000);
        }

        // --- CANVAS BACKGROUND ---
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<<35; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()*0.3-0.15, vy: Math.random()*0.3-0.15});
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 255, 136, 0.2)";
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        // ==================== INITIALIZATION ====================
        window.onload = async () => { 
            initCanvas(); 
            animate(); 
            runTimer();
            
            // Load from Firebase first, fallback to localStorage
            await loadFromFirebase();
            
            // Setup real-time sync
            setupRealtimeSync();
            
            // Initial scan
            await scanAndRefresh();
            
            // Start continuous scanning
            startContinuousScan();
            
            refreshUI();
        };
    </script>
</body>
</html>
