<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-X DASHBOARD</title>
    
    <!-- Google Fonts: Roboto and Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #00ff88;
            --neon-glow: rgba(0, 255, 136, 0.4);
            --bg-light: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-border: rgba(255, 255, 255, 0.7);
            --font-head: 'Roboto', sans-serif;
            --font-body: 'Open Sans', sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg-light); 
            color: var(--text-main); 
            font-family: var(--font-body);
            overflow-x: hidden; 
            min-height: 100vh; 
        }

        canvas#bg-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #ffffff 0%, #dae3ed 100%);
        }

        /* --- HEADER --- */
        .header {
            position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--card-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); z-index: 1000;
        }

        .logo { 
            font-family: var(--font-head); font-weight: 900; font-size: 1.1rem;
            display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;
        }
        .logo-dot { 
            width: 10px; height: 10px; background: var(--neon-green); 
            border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); 
            animation: pulse 2s infinite;
        }

        .timer-capsule {
            background: #0f172a; color: var(--neon-green); padding: 5px 15px; border-radius: 30px;
            font-family: var(--font-head); font-weight: 700; font-size: 0.9rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        /* --- DASHBOARD LAYOUT --- */
        .container { padding: 20px; max-width: 480px; margin: 0 auto; padding-bottom: 110px; }
        .page { display: none; animation: slideUp 0.4s ease-out forwards; }
        .page.active { display: block; }

        /* --- PREDICTION CARD --- */
        .main-card {
            background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 32px;
            padding: 30px 20px; text-align: center; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04); margin-bottom: 20px;
            position: relative; overflow: hidden;
        }

        /* Shimmer Border Animation */
        .main-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: rotate(45deg); animation: shimmer 4s infinite;
        }

        .issue-label {
            font-family: var(--font-head); font-size: 0.75rem; color: var(--text-muted);
            background: #e2e8f0; padding: 4px 12px; border-radius: 20px;
            display: inline-block; margin-bottom: 20px; font-weight: 500;
        }

        .viz-container {
            position: relative; width: 170px; height: 170px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .neon-ring {
            position: absolute; width: 100%; height: 100%; border: 2px solid transparent;
            border-top: 2px solid var(--neon-green); border-right: 2px solid var(--neon-green);
            border-radius: 50%; animation: rotate 3s linear infinite;
        }

        .prediction-output {
            font-family: var(--font-head); font-size: 2.6rem; font-weight: 900;
            color: #0f172a; letter-spacing: -1px;
        }

        /* --- STATS TILES --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-tile { 
            background: #0f172a; color: #fff; padding: 15px 5px; border-radius: 20px; 
            text-align: center; border: 1px solid #1e293b;
        }
        .stat-tile span { display: block; font-family: var(--font-head); color: var(--neon-green); font-size: 1.2rem; font-weight: 700; }
        .stat-tile small { font-size: 0.65rem; opacity: 0.6; font-weight: 600; text-transform: uppercase; }

        /* --- HISTORY TABLE --- */
        .history-title {
            font-family: var(--font-head); font-size: 0.9rem; font-weight: 700;
            margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
        }
        .table-container { 
            background: var(--card-bg); border-radius: 28px; border: 1px solid var(--glass-border); 
            overflow: hidden;
        }
        .table-head { 
            display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 1fr 1fr; 
            padding: 15px 10px; background: #f8fafc; font-weight: 700; 
            font-size: 0.65rem; color: var(--text-muted); text-align: center;
        }
        .table-row { 
            display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 1fr 1fr; 
            padding: 15px 10px; border-bottom: 1px solid #f1f5f9; align-items: center; 
            text-align: center; font-size: 0.85rem; font-weight: 500;
        }
        
        .status-badge { 
            padding: 4px 8px; border-radius: 8px; font-size: 0.65rem; 
            font-weight: 800; font-family: var(--font-head);
        }
        .win-bg { background: #dcfce7; color: #166534; }
        .loss-bg { background: #fee2e2; color: #991b1b; }

        .number-ball { 
            width: 24px; height: 24px; background: #1e293b; color: var(--neon-green); 
            border-radius: 50%; display: inline-grid; place-items: center; 
            font-size: 0.75rem; font-family: var(--font-head); font-weight: 700;
            margin: 0 auto;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 15px; left: 15px; right: 15px; background: #0f172a;
            height: 72px; border-radius: 24px; display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-btn { 
            color: #64748b; text-decoration: none; font-size: 0.7rem; 
            display: flex; flex-direction: column; align-items: center; transition: 0.3s;
            font-weight: 600; font-family: var(--font-head);
        }
        .nav-btn.active { color: var(--neon-green); }
        .nav-icon { width: 22px; height: 22px; fill: currentColor; margin-bottom: 4px; }

        /* --- ANIMATIONS --- */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { transform: translateX(-150%) rotate(45deg); } 100% { transform: translateX(150%) rotate(45deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        #win-sticker {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; padding: 30px 50px; border-radius: 20px; z-index: 2000;
            box-shadow: 0 0 50px var(--neon-green); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid var(--neon-green); text-align: center;
        }
        #win-sticker.active { transform: translate(-50%, -50%) scale(1); }
        #win-sticker h1 { font-family: var(--font-head); font-weight: 900; color: #000; }
    </style>
</head>
<body>

    <canvas id="bg-particles"></canvas>

    <header class="header">
        <div class="logo"><div class="logo-dot"></div>CYBER-X</div>
        <div class="timer-capsule" id="display-timer">00:00</div>
    </header>

    <div class="container">
        
        <!-- DASHBOARD PAGE -->
        <section id="page-home" class="page active">
            <div class="main-card">
                <div class="issue-label">ISSUE <span id="target-issue">...</span></div>
                <div class="viz-container">
                    <div class="neon-ring" id="ring-anim"></div>
                    <div id="ai-prediction" class="prediction-output">...</div>
                </div>
                
                <div style="width: 80%; margin: 0 auto 10px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700; margin-bottom: 6px; font-family: var(--font-head);">
                        <span style="color: var(--text-muted);">AI CONFIDENCE</span>
                        <span id="prob-val" style="color: var(--neon-green);">0%</span>
                    </div>
                    <div style="height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden;">
                        <div id="prob-bar" style="width: 0%; height: 100%; background: var(--neon-green); transition: 1.5s; box-shadow: 0 0 10px var(--neon-green);"></div>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-tile"><span id="total-wins">0</span><small>Wins</small></div>
                <div class="stat-tile"><span id="total-loss">0</span><small>Loss</small></div>
                <div class="stat-tile"><span id="total-acc">0%</span><small>Accuracy</small></div>
            </div>

            <h3 class="history-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--neon-green)"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                PREDICTION LOG
            </h3>
            
            <div class="table-container">
                <div class="table-head">
                    <span>ISSUE</span>
                    <span>AI</span>
                    <span>NUM</span>
                    <span>REAL</span>
                    <span>STAT</span>
                </div>
                <div id="log-body">
                    <!-- Dynamic Rows -->
                </div>
            </div>
        </section>

        <!-- SETTINGS PAGE -->
        <section id="page-sys" class="page">
            <h2 style="font-family: var(--font-head); margin-bottom: 20px;">SYSTEM</h2>
            <div class="table-container" style="padding: 20px;">
                <p style="font-size: 0.9rem; margin-bottom: 20px; color: var(--text-muted);">Neural Engine v4.2 Connected to WinGo 1M Data Node.</p>
                <button onclick="clearHistory()" style="width:100%; padding: 15px; border-radius: 16px; border: none; background: #ff4757; color: #fff; font-family: var(--font-head); font-weight: 700; cursor: pointer;">RESET DATA</button>
            </div>
        </section>

    </div>

    <!-- NAVIGATION BAR -->
    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-btn active" onclick="nav('page-home', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>HOME</span>
        </a>
        <a href="javascript:void(0)" class="nav-btn" onclick="nav('page-sys', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65c-.04-.24-.25-.42-.5-.42h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.39 1.06.73 1.69.98l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/></svg>
            <span>SYSTEM</span>
        </a>
    </nav>

    <div id="win-sticker"><h1>WINNER</h1></div>

    <script>
        const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
        let stats = JSON.parse(localStorage.getItem('cyberX_v3')) || { wins: 0, loss: 0, log: [] };
        let activePred = null; 
        let lastKnownIssue = "";

        // --- NAVIGATION ---
        function nav(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // ============================================================
        // === DETERMINISTIC PREDICTION ENGINE (No Math.random) =======
        // ============================================================

        /**
         * STEP 1 — Issue Number Hash Score
         * Extracts last 6 digits, applies alternating prime weights,
         * maps modulo result to a directional score.
         */
        function issueScore(issueNumber) {
            const s = issueNumber.toString();
            const digits = s.slice(-6).padStart(6, '0').split('').map(Number);
            // Prime-weighted sum: distinct weights reduce collision patterns
            const weights = [7, 3, 11, 2, 13, 5];
            const weighted = digits.reduce((acc, d, i) => acc + d * weights[i], 0);
            const mod = weighted % 10; // 0–9
            // 0–4 → lean SMALL (−1), 5–9 → lean BIG (+1)
            return mod >= 5 ? 1 : -1;
        }

        /**
         * STEP 2 — History Pattern Score
         * Streak reversal: 3+ consecutive same result → lean opposite.
         * Frequency balance: if recent window is skewed, lean the other way.
         */
        function historyScore() {
            const recent = stats.log.slice(0, 6);
            if (recent.length === 0) return 0;

            let score = 0;

            // --- Streak detection ---
            const lastResult = recent[0].real;
            let streak = 0;
            for (let i = 0; i < recent.length; i++) {
                if (recent[i].real === lastResult) streak++;
                else break;
            }
            // After 3+ streak: strong contrarian signal
            if (streak >= 3) score += lastResult === 'BIG' ? -3 : 3;
            else if (streak === 2) score += lastResult === 'BIG' ? -1 : 1;

            // --- Frequency balance in last 6 ---
            const bigCount  = recent.filter(l => l.real === 'BIG').length;
            const smCount   = recent.length - bigCount;
            // Over-represented side gets contrarian pressure
            if (bigCount > smCount + 2) score -= 2;
            else if (smCount > bigCount + 2) score += 2;

            return score;
        }

        /**
         * STEP 3 — Confidence Calculation
         * Based on combined signal strength + recent win accuracy.
         * Range: 72% – 96%
         */
        function calcConfidence(totalScore, predType) {
            const signalStrength = Math.min(Math.abs(totalScore), 5); // cap at 5
            let base = 72 + signalStrength * 4; // 72–92

            // Bonus: recent accuracy > 60% adds up to 4 points
            const recentN = Math.min(stats.log.length, 10);
            if (recentN > 0) {
                const recentWins = stats.log.slice(0, recentN).filter(l => l.status === 'WIN').length;
                const acc = recentWins / recentN;
                if (acc > 0.6) base += Math.round((acc - 0.6) * 10); // 0–4 bonus
            }

            return Math.min(base, 96);
        }

        /**
         * MASTER PREDICT — combines all signals into a final BIG/SMALL + confidence
         */
        function masterPredict(issueNumber) {
            const iScore = issueScore(issueNumber);
            const hScore = historyScore();
            const total  = iScore + hScore;

            const type = total >= 0 ? 'BIG' : 'SMALL';
            const confidence = calcConfidence(total, type);
            return { type, confidence };
        }

        // ============================================================
        // === CORE ENGINE ============================================
        // ============================================================

        async function syncAPI() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (!data.data || !data.data.list) return;
                
                const latestDraw = data.data.list[0];
                if (latestDraw.issueNumber !== lastKnownIssue) {
                    processDraw(latestDraw);
                    lastKnownIssue = latestDraw.issueNumber;
                    generateNewPred(latestDraw.issueNumber);
                }
            } catch (e) {
                simulateLogic();
            }
        }

        function processDraw(draw) {
            const num = parseInt(draw.number);
            const actualBS = num >= 5 ? 'BIG' : 'SMALL';
            
            if (activePred && activePred.issue === draw.issueNumber) {
                const isWin = activePred.type === actualBS;
                if (isWin) { stats.wins++; triggerWin(); } else { stats.loss++; }

                stats.log.unshift({
                    issue: draw.issueNumber,
                    ai: activePred.type,
                    num: num,
                    real: actualBS,
                    status: isWin ? 'WIN' : 'LOSS'
                });

                if (stats.log.length > 20) stats.log.pop();
                save();
            }
        }

        function generateNewPred(lastId) {
            const nextId = (BigInt(lastId) + 1n).toString();
            document.getElementById('target-issue').innerText = nextId;
            
            const aiText = document.getElementById('ai-prediction');
            const bar    = document.getElementById('prob-bar');
            const val    = document.getElementById('prob-val');

            aiText.innerText = "WAIT";
            aiText.style.opacity = "0.5";
            bar.style.width = "0%";

            setTimeout(() => {
                // ★ DETERMINISTIC — no Math.random ★
                const { type, confidence } = masterPredict(nextId);

                aiText.innerText = type;
                aiText.style.opacity = "1";
                bar.style.width = confidence + "%";
                val.innerText = confidence + "%";
                activePred = { issue: nextId, type: type };
            }, 2500);
        }

        function save() {
            localStorage.setItem('cyberX_v3', JSON.stringify(stats));
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('total-wins').innerText = stats.wins;
            document.getElementById('total-loss').innerText = stats.loss;
            const total = stats.wins + stats.loss;
            document.getElementById('total-acc').innerText = total === 0 ? "0%" : Math.round((stats.wins / total) * 100) + "%";

            const logBody = document.getElementById('log-body');
            logBody.innerHTML = stats.log.map(item => `
                <div class="table-row">
                    <span style="font-size:0.65rem; color:var(--text-muted); font-family:var(--font-head);">...${item.issue.slice(-4)}</span>
                    <span style="font-weight:700; color:${item.ai === 'BIG' ? '#6366f1' : '#f59e0b'}">${item.ai.charAt(0)}</span>
                    <span><div class="number-ball">${item.num}</div></span>
                    <span style="font-weight:700; font-size:0.7rem; font-family:var(--font-head);">${item.real}</span>
                    <span><b class="status-badge ${item.status === 'WIN' ? 'win-bg' : 'loss-bg'}">${item.status}</b></span>
                </div>
            `).join('');
        }

        function triggerWin() {
            const s = document.getElementById('win-sticker');
            s.classList.add('active');
            setTimeout(() => s.classList.remove('active'), 2000);
        }

        function clearHistory() { 
            stats = { wins: 0, loss: 0, log: [] }; 
            save(); 
        }

        // --- TIMER ---
        function runTimer() {
            setInterval(() => {
                const sec = new Date().getSeconds();
                const rem = 60 - sec;
                document.getElementById('display-timer').innerText = `00:${rem.toString().padStart(2, '0')}`;
                if (rem === 59) syncAPI();
                
                const ring = document.getElementById('ring-anim');
                ring.style.animationDuration = rem < 10 ? "1s" : "3s";
            }, 1000);
        }

        /**
         * Offline fallback — derives mock issue & number deterministically from epoch minute.
         * No Math.random used.
         */
        function simulateLogic() {
            const epochMin  = Math.floor(Date.now() / 60000);
            const mockIssue = epochMin.toString();

            if (mockIssue !== lastKnownIssue) {
                // Deterministic mock number: use last two digits of epoch second
                const epochSec  = Math.floor(Date.now() / 1000);
                const mockNum   = ((epochSec % 100) % 10).toString(); // 0-9, repeatable
                processDraw({ issueNumber: mockIssue, number: mockNum });
                lastKnownIssue = mockIssue;
                generateNewPred(mockIssue);
            }
        }

        // --- BACKGROUND PARTICLES (visual only — Math.random kept here intentionally) ---
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for (let i = 0; i < 35; i++) {
                pts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: Math.random() * 0.3 - 0.15,
                    vy: Math.random() * 0.3 - 0.15
                });
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 255, 136, 0.2)";
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onload = () => { initCanvas(); animate(); runTimer(); syncAPI(); refreshUI(); };
    </script>
</body>
</html>
